name: Daily AI Digest

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: '专题关键词（可选）'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python src/main.py

      - name: Generate index
        run: |
          python -c "
import json, os
from pathlib import Path
files = sorted([f.stem for f in Path('web/data').glob('*.json') if f.stem != 'index'], reverse=True)
with open('web/data/index.json', 'w') as f:
    json.dump(files, f)
print('Dates indexed:', files[:5])
"

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily/
          git add web/data/
          git diff --cached --quiet || (git commit -m "Update daily digest $(date +%Y-%m-%d)" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
