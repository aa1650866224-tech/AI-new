# AI新闻助手主配置
deepseek:
  api_key: ${DEEPSEEK_API_KEY}
  api_base: "https://api.deepseek.com/v1"
  model: "deepseek-chat"

# Hacker News
hackernews:
  min_score: 50
  min_comments: 150  # 评论数门槛：讨论热度 = 是否值得关注
  max_results: 30

# Reddit
reddit:
  subreddits:
    - "LocalLLaMA"  # 编辑判定：r/MachineLearning 近年水化，r/artificial 是新手集中地，只留 LocalLLaMA
  max_results_per_sub: 15
  min_score: 10

# RSS 订阅源（通用采集器）
# 注意：以下 3 家无官方 RSS，需 Phase 4 RSSHub 部署后通过 RSSHub 路由接入：
#   - 机器之心（jiqizhixin.com/rss 已重定向至付费 data-service）
#       RSSHub 候选：/jiqizhixin/news 或 /jiqizhixin/category/{category}
#   - Anthropic News（anthropic.com/news 无 <link rel=alternate> 标签）
#       RSSHub 候选：/anthropic/news
#   - Meta AI Blog（ai.meta.com/blog/ 无官方 RSS）
#       RSSHub 候选：/meta/ai-blog
rss:
  feeds:
    # 中文媒体
    - name: "量子位"
      url: "https://www.qbitai.com/feed"

    # 海外厂商博客（一手发布源）
    - name: "OpenAI"
      url: "https://openai.com/blog/rss.xml"
    - name: "Google DeepMind"
      url: "https://deepmind.google/blog/rss.xml"

    # 一线开发者 blog（编辑判定：信号密度抵得上多个聚合源）
    - name: "Simon Willison"
      url: "https://simonwillison.net/atom/everything/"
    - name: "Lilian Weng"
      url: "https://lilianweng.github.io/index.xml"
    - name: "Eugene Yan"
      url: "https://eugeneyan.com/rss/"
    - name: "Chip Huyen"
      url: "https://huyenchip.com/feed.xml"
  max_per_feed: 10

# GitHub
github:
  token: ${GH_PAT}
  trending_count: 15
  # 抓取哪些语言的 Trending，空字符串表示全部语言
  # 可选值: "", "python", "javascript", "typescript", "go", "rust", "c++" 等
  trending_languages:
    - ""
  tracked_repos:
    - "openai/openai-python"
    - "meta-llama/llama"
    - "microsoft/Phi-3CookBook"
    - "google/gemma.cpp"
    - "anthropics/anthropic-cookbook"
  check_releases: true

# 热度评分权重
ranking:
  like_weight: 1.0
  retweet_weight: 2.0
  reply_weight: 1.5
  star_weight: 1.0
  fork_weight: 1.5
  follower_threshold: 100000
  follower_bonus: 1.2
  decay_hours: 12
  decay_rate: 0.02
  max_per_cluster: 2
  daily_top_n: 15

# 推送与存储
storage:
  data_dir: "data/daily"
  web_data_dir: "web/data"

# 定时任务 (GitHub Actions 不需要本地定时，保留配置供参考)
schedule:
  daily_digest: "0 1 * * *"
